<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Project Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 6px;
            border: none;
            background-color: #1f4037;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #16332d;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>System Login</h2>

    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <select id="role">
        <option value="">Select Role</option>
        <option value="admin">Admin</option>
        <option value="analyst">Analyst</option>
    </select>

    <button onclick="login()">Login</button>

    <div class="error" id="error-message"></div>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;
    const errorBox = document.getElementById("error-message");

    errorBox.innerText = "";

    if (!username || !password || !role) {
        errorBox.innerText = "Please fill all fields and select role.";
        return;
    }

    try {
        const response = await fetch("http://localhost:8000/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password,
                role: role
            })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem("token", data.access_token);
            localStorage.setItem("role", role);

            alert("Login successful!");

            // Redirect based on role
            if (role === "admin") {
                window.location.href = "index.html";
            } else {
                window.location.href = "index.html";
            }

        } else {
            errorBox.innerText = "Invalid credentials or role.";
        }

    } catch (error) {
        errorBox.innerText = "Server error. Please try again.";
    }
}
</script>

</body>
</html>
